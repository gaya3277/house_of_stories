<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Catch the Stars</title>

    <link rel="stylesheet" href="../style.css">

</head>

<body>

<section class="stars-scene">
    <div id="gameScene">
        <!-- Moon -->

        <img class="moon"
            src="../assets/effects/moon.png">

        <!-- Floating Stars -->

        <img class="star star1"
            src="../assets/effects/stars.png">

        <img class="star star2"
            src="../assets/effects/stars.png">

        <img class="star star3"
            src="../assets/effects/stars.png">

        <img class="star star4"
            src="../assets/effects/stars.png">

        <img class="star star5"
            src="../assets/effects/stars.png">

        <img class="star star6"
            src="../assets/effects/stars.png">

        <!-- Jar -->

        <img class="jar"
            src="../assets/objects/jar.png">
        <div id="starCounter" class="star-counter">

            ⭐ 0

        </div>

        <!-- Girl -->

        <img class="hall-girl"
            src="../assets/characters/girl1.png">

        <!-- Cat -->

        <img class="hall-cat"
            src="../assets/characters/cat_lookingup.png">
        <button id="finishStars" class="finish-button">

            Finish

        </button>
    </div>
    <img
        id="constellation" class="constellation hidden" 
        src="../assets/minigame_objects/constellation.png">

</section>

<script src="../stars.js"></script>

</body>

</html>
