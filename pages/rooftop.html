<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Rooftop</title>

<link rel="stylesheet"
href="../style.css">

</head>

<body>
<section class="rooftop-scene">

    <img
        class="rooftop-background"
        src="../assets/backgrounds/rooftop.png">

    <img
        id="cat"
        class="rooftop-cat"
        src="../assets/characters/cat_lookingup.png">

    <img
        id="girl"
        class="rooftop-girl hidden"
        src="../assets/characters/girl2.png">

    <div id="birthdayNote" class="birthday-note hidden">

        <h1>Happy Birthday</h1>

        <h2>Sree Ranjini 🎂</h2>

        <p>

            Thank you for walking through
            this little House of Stories.

            <br><br>

            I hope this year brings you

            peace,

            healing,

            laughter,

            beautiful memories,

            and dreams that finally come true.

            <br><br>

            With love,

            <br>

            <b>Gayi ❤️</b>

        </p>

    </div>
    <button
    id="restartButton"
    class="restart-button hidden">

        Restart Journey

    </button>
    
    <div id="glow" class="glow hidden"></div>

</section>

<script src="../rooftop.js"></script>

</body>

</html>
